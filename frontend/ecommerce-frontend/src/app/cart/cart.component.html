<div class="container mt-4">
  <h2>Your Cart</h2>

  <table class="table table-bordered" *ngIf="items.length > 0; else emptyCart">
    <thead>
      <tr>
        <th>Name</th>
        <th>Category</th>
        <th>Price</th>
        <th>Quantity</th>
        <th>Subtotal</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let item of items">
        <td>{{ item.name }}</td>
        <td>{{ item.category }}</td>
        <td>{{ item.price | currency:'INR' }}</td>
        <td>{{ getQuantity(item.id) }}</td>
        <td>{{ item.price * getQuantity(item.id) | currency:'INR' }}</td>
        <td>
          <button class="btn btn-danger btn-sm" (click)="removeItem(item.id)">Remove</button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="items.length > 0" class="mt-3">
    <h4>Total: {{ total | currency:'INR' }}</h4>
    <button class="btn btn-warning" (click)="clearCart()">Clear Cart</button>
    <a routerLink="/checkout" class="btn btn-success">Proceed to Checkout</a>
  </div>

  <ng-template #emptyCart>
    <p>Your cart is empty.</p>
  </ng-template>
</div>

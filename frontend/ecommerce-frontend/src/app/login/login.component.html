<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card shadow-lg p-4" style="max-width: 400px; width: 100%;">
    <h3 class="text-center mb-4">Welcome Back 👋</h3>

    <form (ngSubmit)="login()">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input [(ngModel)]="email" name="email" type="email" class="form-control" placeholder="Enter your email" required />
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input [(ngModel)]="password" name="password" type="password" class="form-control" placeholder="Enter your password" required />
      </div>

      <button class="btn btn-primary w-100" type="submit" [disabled]="loading">
        <span *ngIf="!loading">Login</span>
        <span *ngIf="loading"><i class="spinner-border spinner-border-sm"></i> Logging in...</span>
      </button>
    </form>

    <!-- Feedback messages -->
    <div *ngIf="successMessage" class="alert alert-success mt-3 text-center">
      {{ successMessage }}
    </div>
    <div *ngIf="errorMessage" class="alert alert-danger mt-3 text-center">
      {{ errorMessage }}
    </div>

    <div class="text-center mt-3">
      <small>Don't have an account? <a routerLink="/register">Register</a></small>
    </div>
  </div>
</div>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
  <div class="collapse navbar-collapse">
    <ul class="navbar-nav">

      <!-- Show Login only if NOT logged in -->
      <li class="nav-item" *ngIf="!authService.isAuthenticated()">
        <a class="nav-link" routerLink="/login" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          Login
        </a>
      </li>

      <!-- Show these links only if logged in -->
      <li class="nav-item" *ngIf="authService.isAuthenticated()">
        <a class="nav-link" routerLink="/cart" routerLinkActive="active">Cart</a>
      </li>
      <li class="nav-item" *ngIf="authService.isAuthenticated()">
        <a class="nav-link" routerLink="/checkout" routerLinkActive="active">Checkout</a>
      </li>
      <li class="nav-item" *ngIf="authService.isAuthenticated()">
        <a class="nav-link" routerLink="/admin" routerLinkActive="active">Admin</a>
      </li>
      <li class="nav-item" *ngIf="authService.isAuthenticated()">
        <a class="nav-link" routerLink="/products/create" routerLinkActive="active">Add Product</a>
      </li>
      <li class="nav-item" *ngIf="authService.isAuthenticated()">
        <a class="nav-link" [routerLink]="['/payment-status']" [queryParams]="{ orderId: 1 }" routerLinkActive="active">
          Payment Status
        </a>
      </li>
      <li class="nav-item" *ngIf="authService.isAuthenticated()">
        <a class="nav-link" [routerLink]="['/order-tracking', 1]" routerLinkActive="active">
          Order Tracking
        </a>
      </li>
      <li class="nav-item" *ngIf="authService.isAuthenticated()">
        <a class="nav-link" routerLink="/order-history" routerLinkActive="active">Order History</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" routerLink="/products" routerLinkActive="active">Products</a>
      </li>

      <li class="nav-item" *ngIf="authService.isAuthenticated()" >

      </li>

  </div>
